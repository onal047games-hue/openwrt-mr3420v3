name: Cleanup Artifacts

on:
  schedule:
    - cron: '0 2 * * 0'

  workflow_dispatch:

jobs:
  cleanup:

    runs-on: ubuntu-latest

    permissions:
      actions: write

    steps:
      - uses: kolpav/purge-artifacts-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          expire-in: 7days
