name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Environment
        run: |
          uname -a
          df -h
          free -m

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 --branch v19.07.10 https://github.com/openwrt/openwrt.git

      - name: Verify
        run: |
          pwd
          ls -lah
          ls -lah openwrt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-source
          path: openwrt
