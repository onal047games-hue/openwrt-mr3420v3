name: Build OpenWrt MR3420 v3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib \
        gettext git libncurses5-dev libssl-dev python3 python3-distutils \
        rsync unzip zlib1g-dev file wget curl

    - name: Clone OpenWrt
      run: |
        git clone --depth=1 --branch v19.07.10 https://github.com/openwrt/openwrt.git

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Create Config
      run: |
        cd openwrt

        cat > .config <<EOF
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_tiny=y
        CONFIG_TARGET_ath79_tiny_DEVICE_tplink_tl-mr3420-v3=y

        CONFIG_PACKAGE_dnsmasq=y
        CONFIG_PACKAGE_firewall=y
        CONFIG_PACKAGE_iptables=y

        CONFIG_PACKAGE_ppp=y
        CONFIG_PACKAGE_ppp-mod-pppoe=y

        CONFIG_PACKAGE_wpad-mini=y

        CONFIG_PACKAGE_luci=n
        CONFIG_PACKAGE_uhttpd=n

        CONFIG_IPV6=n
        EOF

        make defconfig

    - name: Download Sources
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: Build Firmware
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/targets/**
