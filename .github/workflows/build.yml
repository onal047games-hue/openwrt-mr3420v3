name: Build OpenWrt MR3420 v3

on:
  workflow_dispatch:

env:
  OPENWRT_BRANCH: v19.07.10

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            ack \
            antlr3 \
            asciidoc \
            autoconf \
            automake \
            autopoint \
            binutils \
            bison \
            build-essential \
            bzip2 \
            ccache \
            clang \
            cmake \
            cpio \
            curl \
            device-tree-compiler \
            fastjar \
            flex \
            gawk \
            gettext \
            gcc-multilib \
            g++-multilib \
            git \
            gperf \
            haveged \
            help2man \
            intltool \
            libc6-dev-i386 \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libpython3-dev \
            libreadline-dev \
            libssl-dev \
            libtool \
            lrzsz \
            mkisofs \
            msmtp \
            nano \
            p7zip-full \
            patch \
            pkgconf \
            python3 \
            python3-pip \
            rsync \
            scons \
            squashfs-tools \
            subversion \
            swig \
            texinfo \
            uglifyjs \
            unzip \
            vim \
            wget \
            xsltproc \
            zlib1g-dev

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 \
          --branch ${OPENWRT_BRANCH} \
          https://github.com/openwrt/openwrt.git

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config
        run: |
          cd openwrt

          cat > .config <<EOF
          CONFIG_TARGET_ath79=y
          CONFIG_TARGET_ath79_tiny=y
          CONFIG_TARGET_ath79_tiny_DEVICE_tplink_tl-mr3420-v3=y

          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_iptables=y

          CONFIG_PACKAGE_dropbear=y

          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y

          CONFIG_PACKAGE_wpad-mini=y

          CONFIG_PACKAGE_luci=n
          CONFIG_PACKAGE_uhttpd=n

          CONFIG_IPV6=n
          EOF

          make defconfig

      - name: Show Config
        run: |
          cd openwrt
          cat .config

      - name: Download Sources
        run: |
          cd openwrt
          make download -j8

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j2 V=s

      - name: Upload Firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            openwrt/bin/targets/**

      - name: Upload Config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config
          path: |
            openwrt/.config

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            openwrt/logs
            openwrt/bin
