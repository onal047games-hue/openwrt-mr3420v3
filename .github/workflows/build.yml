name: Build OpenWrt MR3420 v3

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: v19.07.10

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Show Environment
      run: |
        uname -a
        df -h
        free -m

    - name: Install Dependencies
      run: |
        sudo apt update

        sudo apt install -y \
        build-essential \
        clang \
        flex \
        bison \
        g++ \
        gawk \
        gcc-multilib \
        gettext \
        git \
        libncurses5-dev \
        libssl-dev \
        python3 \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl \
        ccache

    - name: Clone OpenWrt
      run: |
        git clone --depth=1 \
        --branch ${REPO_BRANCH} \
        ${REPO_URL} openwrt

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy Config
      run: |
        cp ../config/mr3420v3.diffconfig openwrt/.config
        cd openwrt
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8

    - name: Build Firmware
      run: |
        cd openwrt
        make -j2 V=s

    - name: Upload Firmware
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/targets/**

    - name: Upload Config
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: config
        path: openwrt/.config

    - name: Upload Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: |
          openwrt/bin
          openwrt/logs
